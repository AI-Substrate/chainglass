# Chainglass Configuration
# Documentation: https://github.com/chainglass/chainglass/docs/configuration
#
# This file was created on first run. Customize as needed.
# Environment variables (CG_*) override these values.
# Example: CG_SAMPLE__TIMEOUT=60 overrides sample.timeout

# Sample configuration (reference implementation)
# This demonstrates the configuration pattern for Chainglass
sample:
  # Enable or disable the sample feature
  enabled: true

  # Timeout in seconds (1-300)
  timeout: 30

  # Human-readable name for this configuration
  name: default

# Uncomment to customize:
# sample:
#   timeout: 60
#   name: my-project
