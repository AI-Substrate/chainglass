<meta charset="UTF-8">

<title>Terminal Theme Catalog — Plan 081</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #7aa2f7;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text-muted);
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 20px 24px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 24px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; padding: 12px; gap: 16px; }
  }
  .card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    background: var(--surface);
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-dark { background: #1e293b; color: #94a3b8; }
  .badge-light { background: #fef3c7; color: #92400e; }
  .badge-family {
    background: rgba(122, 162, 247, 0.15);
    color: var(--accent);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .terminal {
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.45;
    padding: 16px;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }
  .terminal .prompt { font-weight: 600; }
  .terminal .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .palette {
    display: flex;
    gap: 2px;
    padding: 0 16px 12px;
  }
  .palette-swatch {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    transition: height 0.15s;
  }
  .card:hover .palette-swatch { height: 10px; }
  .color-grid {
    display: none;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
    padding: 8px 16px 12px;
  }
  .card:hover .color-grid { display: grid; }
  .card:hover .palette { display: none; }
  .color-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: transparent;
    transition: color 0.15s;
    cursor: default;
  }
  .color-cell:hover { color: inherit; font-weight: 700; }
</style>
</head>

    `<span style="color:${th.green}">(23 tests)</span>`,
    `<span style="color:${th.brightBlack}"> ✓ </span>` +
    `<span style="color:${th.foreground}">theme-resolver.test.ts </span>` +
    `<span style="color:${th.green}">(8 tests)</span>`,
    `<span style="color:${th.brightBlack}"> ✗ </span>` +
    `<span style="color:${th.red}">settings.test.ts </span>` +
    `<span style="color:${th.red}">(1 failed)</span>`,

    ``,
    `<span style="color:${th.magenta}">Test Files</span>` +
    `<span style="color:${th.foreground}">  3 passed | </span>` +
    `<span style="color:${th.red}">1 failed</span>`,
    `<span style="color:${th.cyan}">Tests</span>` +
    `<span style="color:${th.foreground}">       31 passed | </span>` +
    `<span style="color:${th.red}">1 failed</span>`,

    ``,
    `<span style="color:${th.green}">user@dev</span>` +
    `<span style="color:${th.foreground}">:</span>` +
    `<span style="color:${th.blue}">~/projects/chainglass</span>` +
    `<span style="color:${th.foreground}">$ </span>` +
    `<span class="cursor" style="background:${th.cursor}"> </span>`,
  ];
  return lines.join('\n');
}

function renderPalette(th) {
  const keys = ['black','red','green','yellow','blue','magenta','cyan','white',
    'brightBlack','brightRed','brightGreen','brightYellow','brightBlue','brightMagenta','brightCyan','brightWhite'];
  return keys.map(k => `<div class="palette-swatch" style="background:${th[k]}" title="${k}: ${th[k]}"></div>`).join('');
}

function renderColorGrid(th) {
  const keys = ['black','red','green','yellow','blue','magenta','cyan','white',
    'brightBlack','brightRed','brightGreen','brightYellow','brightBlue','brightMagenta','brightCyan','brightWhite'];
  const labels = ['blk','red','grn','ylw','blu','mag','cyn','wht','b.blk','b.red','b.grn','b.ylw','b.blu','b.mag','b.cyn','b.wht'];
  return keys.map((k,i) => {
    const c = th[k];
    const contrast = isLight(c) ? '#000' : '#fff';
    return `<div class="color-cell" style="background:${c};color:${contrast}" title="${k}: ${c}">${labels[i]}</div>`;
  }).join('');
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128;
}

function renderCard(t) {
  const th = t.theme;
  const familyBadge = t.family ? `<span class="badge badge-family">${t.family}</span>` : '';
  return `
    <div class="card" data-category="${t.category}">
      <div class="card-header">
        <span class="card-title">
          ${t.name}
          ${familyBadge}
        </span>
        <span class="badge badge-${t.category}">${t.category === 'dark' ? '🌙 dark' : '☀️ light'}</span>
      </div>
      <div class="terminal" style="background:${th.background};color:${th.foreground}">
        <pre>${renderTerminal(t)}</pre>
      </div>
      <div class="palette">${renderPalette(th)}</div>
      <div class="color-grid">${renderColorGrid(th)}</div>
    </div>
  `;
}

function render(themes) {
  document.getElementById('grid').innerHTML = themes.map(renderCard).join('');
}

function filter(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (cat === 'all') { render(THEMES); return; }
  render(THEMES.filter(t => t.category === cat));
}

render(THEMES);
</script>
</body>
</html>
