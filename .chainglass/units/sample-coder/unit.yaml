slug: sample-coder
type: agent
version: 1.0.0
description: Generates code based on specification

inputs:
  - name: reviewed_spec
    type: data
    data_type: text
    required: true
    description: The reviewed specification to implement

outputs:
  - name: language
    type: data
    data_type: text
    required: true
    description: The programming language chosen
  - name: code
    type: file
    required: true
    description: The generated code file

agent:
  prompt_template: prompts/main.md
  supported_agents:
    - claude-code
  estimated_tokens: 2000
