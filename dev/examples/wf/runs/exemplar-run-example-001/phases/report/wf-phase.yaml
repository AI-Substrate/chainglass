# Report Phase Configuration
# Extracted from wf.yaml for hello-workflow

phase: report
description: "Generate final report from processed data"
order: 3

inputs:
  files:
    - name: result.md
      required: true
      from_phase: process
      description: "Processing result from process phase"
    - name: process-data.json
      required: true
      from_phase: process
      description: "Processed data from process phase"
  parameters:
